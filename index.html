<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push PWA Test</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        code { background: #eee; padding: 10px; display: block; width: 100%; word-break: break-all; margin-top: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h2>Push Test PWA</h2>
    <button id="subscribeBtn">Разрешить уведомления</button>
    <p>Твой объект подписки (JSON):</p>
    <code id="subscriptionJson">Пока ничего нет...</code>

    <script>
        const PUBLIC_VAPID_KEY = 'ТВОЙ_ПУБЛИЧНЫЙ_VAPID_КЛЮЧ'; // Сгенерируй его!

        if ('serviceWorker' in navigator && 'PushManager' in window) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW зарегистрирован'))
                    .catch(err => console.error('Ошибка SW:', err));
            });
        }

        document.getElementById('subscribeBtn').addEventListener('click', async () => {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                alert('Нужно разрешение!');
                return;
            }

            const registration = await navigator.serviceWorker.ready;
            
            // Подписка
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
            });

            document.getElementById('subscriptionJson').innerText = JSON.stringify(subscription);
            console.log('Subscription:', subscription);
        });

        // Утилита для конвертации ключа
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>
</html>
