<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push PWA Test</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 15px; background: #f0f2f5; }
        button { padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; width: 280px; }
        #subscribeBtn { background: #007bff; color: white; }
        #testPushBtn { background: #28a745; color: white; display: none; } /* Появится после подписки */
        button:active { transform: scale(0.98); }
        code { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 5px; width: 90%; max-width: 500px; word-break: break-all; font-size: 12px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <h2>Тест Пуш-уведомлений</h2>
    
    <button id="subscribeBtn">1. Разрешить и Подписаться</button>
    <button id="testPushBtn">2. Отправить тестовый пуш</button>

    <p>Данные подписки:</p>
    <code id="subscriptionJson">Нажми кнопку 1...</code>

    <script>
        // ВСТАВЬ СЮДА СВОЙ КЛЮЧ (возьми любой из генератора)
        const PUBLIC_VAPID_KEY = 'BAwpz88OdQlV1CJI-vzGlKSf47Vkqd-PW0nO10V19erx_BpOI2OYw8_gb5cqSt2YIjK-W9PtZGZdg5DPYXAe058'; 

        // Регистрация SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
        }

        // Кнопка 1: Подписка
        document.getElementById('subscribeBtn').addEventListener('click', async () => {
            const result = await Notification.requestPermission();
            if (result === 'granted') {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(PUBLIC_VAPID_KEY)
                });
                document.getElementById('subscriptionJson').innerText = JSON.stringify(sub);
                document.getElementById('testPushBtn').style.display = 'block';
                alert('Подписка оформлена!');
            } else {
                alert('Нужно разрешить уведомления в браузере!');
            }
        });

        // Кнопка 2: Тест (имитация пуша через SW)
        document.getElementById('testPushBtn').addEventListener('click', async () => {
            const reg = await navigator.serviceWorker.ready;
            // Мы посылаем сообщение в SW, чтобы он показал уведомление
            reg.active.postMessage({ action: 'test-push' });
        });

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
    </script>
</body>
</html>
